<!DOCTYPE html>
<html>
    <head>
        <title>Maze Game</title>
        <link href="style.css" rel="stylesheet" />
    </head>
    <body>
        <h1>Maze Game</h1>
        <p>The goal of this game is to find the treasure chest, plus all the keys needed to open it. Click the directional buttons to move.</p>
            <div id="grid">
                <div class="tile corner-tile"></div>
                <div class="tile" id="north-tile"></div>
                <div class="tile corner-tile"></div>
                <div class="tile" id="west-tile"></div>
                <div class="tile center-tile"><img id="object-image" src="key.png"></div>
                <div class="tile" id="east-tile"></div>
                <div class="tile corner-tile"></div>
                <div class="tile" id="south-tile"></div>
                <div class="tile corner-tile"></div>
            </div>
            <div class="directional-buttons">
                <button id="ButtonNorth">↑</button><br>
                <button id="ButtonWest">←</button><div class="center-square"></div><button id="ButtonEast">→</button><br>
                <button id="ButtonSouth">↓</button>
            </div>
            <div id="roomstats"></div>
            <div id="text"></div>
        <script src="script.js"></script>
    </body>
</html>
